name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  smoke:
    name: Smoke test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install deps
        run: |
          pip install -r requirements.txt
          pip install playwright
          playwright install --with-deps chromium

      - name: Syntax check
        run: python -m py_compile bot.py

      - name: Start server
        run: |
          python bot.py &
          for i in 1 2 3 4 5; do
            if curl -sf http://localhost:8080/ > /dev/null; then
              echo "server up"
              break
            fi
            sleep 1
          done

      - name: HTTP smoke
        run: |
          set -e
          curl -sf http://localhost:8080/ | grep -q "Спектр"
          curl -sf http://localhost:8080/aac | grep -q "Голос"
          curl -sf http://localhost:8080/static/js/aac.js | grep -q "VOCAB"
          curl -sf -X POST -H 'Content-Type: application/json' \
            -d '{"event":"ci_smoke","data":{}}' \
            http://localhost:8080/api/event | grep -q '"ok": true'

      - name: Visual smoke
        run: python tests/smoke_visual.py

      - name: Upload screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: screenshots
          path: /tmp/spectrum_*.png
          if-no-files-found: warn
