<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
<title>День — Спектр</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<script>(function(){try{var p=JSON.parse(localStorage.getItem("spectrum_sensory_profile")||"null");if(p&&p.dominant&&["hyper","hypo","seeking","mixed"].indexOf(p.dominant)>=0)document.documentElement.classList.add("sp-profile-"+p.dominant)}catch(e){}})();</script>
<link rel="stylesheet" href="/static/css/tokens.css">
<link rel="manifest" href="/manifest.webmanifest">
<meta name="theme-color" content="#4a90e2">
<meta name="description" content="Спектр — бесплатные инструменты для общения и поддержки детей с аутизмом. AAC, расписание, эмоции, истории.">
<meta property="og:title" content="Спектр">
<meta property="og:description" content="Инструменты для общения и поддержки детей с аутизмом. Открыл ссылку — работает.">
<meta property="og:image" content="https://spectrum-app.fly.dev/static/assets/og-image.png">
<meta property="og:type" content="website">
<meta property="og:url" content="https://spectrum-app.fly.dev/">
<meta property="og:locale" content="ru_RU">
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="Спектр">
<meta name="twitter:description" content="Инструменты для общения и поддержки детей с аутизмом.">
<meta name="twitter:image" content="https://spectrum-app.fly.dev/static/assets/og-image.png">
<link rel="icon" type="image/png" sizes="192x192" href="/static/assets/icon-192.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Спектр">
<link rel="apple-touch-icon" href="/static/assets/icon-192.png">
<link rel="icon" type="image/svg+xml" href="/static/assets/icon.svg">
<link rel="stylesheet" href="/static/css/day.css">
</head>
<body>
<main class="day">
  <header class="day-top">
    <button class="day-back" id="back-btn" aria-label="Назад">←</button>
    <h1 class="day-title" id="screen-title">День</h1>
    <div class="day-top-spacer"></div>
  </header>

  <!-- Hub: 2 кнопки выбора режима -->
  <section class="day-screen" data-screen="hub">
    <div class="day-mode-grid">
      <button class="day-mode" data-action="open-firstthen">
        <div class="day-mode-icon">➡️</div>
        <div class="day-mode-label">Сейчас → Потом</div>
        <div class="day-mode-desc">Простая последовательность из двух шагов</div>
      </button>
      <button class="day-mode" data-action="open-routines">
        <div class="day-mode-icon">📋</div>
        <div class="day-mode-label">Распорядок</div>
        <div class="day-mode-desc">Цепочка шагов с отметкой «сделано»</div>
      </button>
    </div>
  </section>

  <!-- First-Then board -->
  <section class="day-screen" data-screen="firstthen" hidden>
    <div class="ft-board">
      <div class="ft-slot" data-slot="first">
        <div class="ft-slot-label">Сейчас</div>
        <button class="ft-slot-content ft-slot-empty" id="ft-first">
          <span class="ft-slot-plus">+</span>
        </button>
      </div>
      <div class="ft-arrow">→</div>
      <div class="ft-slot" data-slot="then">
        <div class="ft-slot-label">Потом</div>
        <button class="ft-slot-content ft-slot-empty" id="ft-then">
          <span class="ft-slot-plus">+</span>
        </button>
      </div>
    </div>
    <button class="day-btn day-btn-clear" id="ft-clear" hidden>Очистить</button>
    <p class="ft-hint">Нажмите на пустую карточку, чтобы выбрать активность</p>
  </section>

  <!-- Routine list -->
  <section class="day-screen" data-screen="routines" hidden>
    <div class="rt-list" id="rt-list"></div>
    <button class="day-btn day-btn-primary day-btn-add-routine" id="add-routine-btn">
      + Свой распорядок
    </button>
  </section>

  <!-- Routine builder (create / edit custom) -->
  <section class="day-screen" data-screen="builder" hidden>
    <div class="rb-section">
      <div class="rb-label">Название</div>
      <input class="rb-input" id="rb-title" maxlength="30" placeholder="например: В парк">
    </div>
    <div class="rb-section">
      <div class="rb-label">Значок</div>
      <div class="rb-icons" id="rb-icons"></div>
    </div>
    <div class="rb-section rb-steps-section">
      <div class="rb-label">Шаги <span class="rb-label-muted" id="rb-step-count">0</span></div>
      <div class="rb-steps" id="rb-steps"></div>
      <button class="rb-add-step" id="rb-add-step">+ Добавить шаг</button>
    </div>
    <div class="rb-actions">
      <button class="day-btn day-btn-secondary" id="rb-delete-btn" hidden>Удалить</button>
      <button class="day-btn day-btn-primary" id="rb-save-btn">Сохранить</button>
    </div>
  </section>

  <!-- Routine in progress -->
  <section class="day-screen" data-screen="routine-active" hidden>
    <div class="rt-progress">
      <div class="rt-progress-bar" id="rt-progress-bar"></div>
    </div>
    <div class="rt-current" id="rt-current"></div>
    <div class="rt-actions">
      <button class="day-btn day-btn-secondary" id="rt-skip">Пропустить</button>
      <button class="day-btn day-btn-primary" id="rt-done">Готово</button>
    </div>
    <div class="rt-upcoming" id="rt-upcoming"></div>
  </section>

  <!-- Routine finished -->
  <section class="day-screen" data-screen="routine-finished" hidden>
    <div class="rt-finish">
      <div class="rt-finish-icon">🎉</div>
      <div class="rt-finish-title">Всё сделано</div>
      <div class="rt-finish-sub" id="rt-finish-sub"></div>
    </div>
    <button class="day-btn day-btn-share" id="rt-share-btn" hidden>📤 Поделиться</button>
    <button class="day-btn day-btn-primary" id="rt-finish-back">К распорядкам</button>
  </section>

  <!-- Activity picker (modal) -->
  <section class="day-screen day-picker" data-screen="picker" hidden>
    <div class="picker-top">
      <button class="picker-back" id="picker-back">×</button>
      <h2 class="picker-title">Выберите активность</h2>
    </div>
    <div class="picker-groups" id="picker-groups"></div>
  </section>
</main>
<script src="/static/js/telegram.js"></script>
<script src="/static/js/telemetry.js"></script>
<script src="/static/js/day.js"></script>
<script src="/static/js/sensory.js" defer></script>
<script src="/static/js/bugreport.js" defer></script>
<script src="/static/js/pwa.js" defer></script>
</body>
</html>
