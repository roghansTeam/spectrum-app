<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
<title>День — Спектр</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<link rel="stylesheet" href="/static/css/tokens.css">
<link rel="stylesheet" href="/static/css/day.css">
</head>
<body>
<main class="day">
  <header class="day-top">
    <button class="day-back" id="back-btn" aria-label="Назад">←</button>
    <h1 class="day-title" id="screen-title">День</h1>
    <div class="day-top-spacer"></div>
  </header>

  <!-- Hub: 2 кнопки выбора режима -->
  <section class="day-screen" data-screen="hub">
    <div class="day-mode-grid">
      <button class="day-mode" data-action="open-firstthen">
        <div class="day-mode-icon">➡️</div>
        <div class="day-mode-label">Сейчас → Потом</div>
        <div class="day-mode-desc">Простая последовательность из двух шагов</div>
      </button>
      <button class="day-mode" data-action="open-routines">
        <div class="day-mode-icon">📋</div>
        <div class="day-mode-label">Распорядок</div>
        <div class="day-mode-desc">Цепочка шагов с отметкой «сделано»</div>
      </button>
    </div>
  </section>

  <!-- First-Then board -->
  <section class="day-screen" data-screen="firstthen" hidden>
    <div class="ft-board">
      <div class="ft-slot" data-slot="first">
        <div class="ft-slot-label">Сейчас</div>
        <button class="ft-slot-content ft-slot-empty" id="ft-first">
          <span class="ft-slot-plus">+</span>
        </button>
      </div>
      <div class="ft-arrow">→</div>
      <div class="ft-slot" data-slot="then">
        <div class="ft-slot-label">Потом</div>
        <button class="ft-slot-content ft-slot-empty" id="ft-then">
          <span class="ft-slot-plus">+</span>
        </button>
      </div>
    </div>
    <button class="day-btn day-btn-clear" id="ft-clear" hidden>Очистить</button>
    <p class="ft-hint">Нажмите на пустую карточку, чтобы выбрать активность</p>
  </section>

  <!-- Routine list -->
  <section class="day-screen" data-screen="routines" hidden>
    <div class="rt-list" id="rt-list"></div>
  </section>

  <!-- Routine in progress -->
  <section class="day-screen" data-screen="routine-active" hidden>
    <div class="rt-progress">
      <div class="rt-progress-bar" id="rt-progress-bar"></div>
    </div>
    <div class="rt-current" id="rt-current"></div>
    <div class="rt-actions">
      <button class="day-btn day-btn-secondary" id="rt-skip">Пропустить</button>
      <button class="day-btn day-btn-primary" id="rt-done">Готово</button>
    </div>
    <div class="rt-upcoming" id="rt-upcoming"></div>
  </section>

  <!-- Routine finished -->
  <section class="day-screen" data-screen="routine-finished" hidden>
    <div class="rt-finish">
      <div class="rt-finish-icon">🎉</div>
      <div class="rt-finish-title">Всё сделано</div>
      <div class="rt-finish-sub" id="rt-finish-sub"></div>
    </div>
    <button class="day-btn day-btn-primary" id="rt-finish-back">К распорядкам</button>
  </section>

  <!-- Activity picker (modal) -->
  <section class="day-screen day-picker" data-screen="picker" hidden>
    <div class="picker-top">
      <button class="picker-back" id="picker-back">×</button>
      <h2 class="picker-title">Выберите активность</h2>
    </div>
    <div class="picker-groups" id="picker-groups"></div>
  </section>
</main>
<script src="/static/js/telegram.js"></script>
<script src="/static/js/telemetry.js"></script>
<script src="/static/js/day.js"></script>
</body>
</html>
