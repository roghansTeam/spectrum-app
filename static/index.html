<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
<title>Спектр</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<link rel="stylesheet" href="/static/css/tokens.css">
<link rel="manifest" href="/manifest.webmanifest">
<meta name="theme-color" content="#4a90e2">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Спектр">
<link rel="apple-touch-icon" href="/static/assets/icon-192.png">
<link rel="icon" type="image/svg+xml" href="/static/assets/icon.svg">
<link rel="stylesheet" href="/static/css/index.css">
</head>
<body>
<main class="hub">
  <h1 class="hub-title">Спектр</h1>
  <p class="hub-sub">Инструменты для общения и поддержки</p>

  <a href="/onboarding" class="hub-banner" id="hub-banner" hidden>
    <span class="hub-banner-icon">✨</span>
    <span class="hub-banner-text">
      <strong>Знакомство</strong>
      <span class="hub-banner-sub">15 вопросов чтобы подстроить Спектр под ребёнка</span>
    </span>
    <span class="hub-banner-arrow">→</span>
  </a>

  <nav class="hub-grid">
    <a href="/aac" class="hub-tile">
      <div class="hub-tile-icon">💬</div>
      <div class="hub-tile-label">Голос</div>
      <div class="hub-tile-desc">Карточки и фразы</div>
    </a>
    <a href="/day" class="hub-tile">
      <div class="hub-tile-icon">📅</div>
      <div class="hub-tile-label">День</div>
      <div class="hub-tile-desc">Расписание и шаги</div>
    </a>
    <a href="/emotions" class="hub-tile">
      <div class="hub-tile-icon">😊</div>
      <div class="hub-tile-label">Эмоции</div>
      <div class="hub-tile-desc">8 уровней игры</div>
    </a>
    <a href="/mood" class="hub-tile">
      <div class="hub-tile-icon">🎚️</div>
      <div class="hub-tile-label">Настроение</div>
      <div class="hub-tile-desc">Для подростков</div>
    </a>
    <a href="/stories" class="hub-tile">
      <div class="hub-tile-icon">📖</div>
      <div class="hub-tile-label">Истории</div>
      <div class="hub-tile-desc">ИИ под ситуацию</div>
    </a>
  </nav>

  <div class="hub-profile-chip" id="profile-chip" hidden></div>
</main>
<script src="/static/js/telegram.js"></script>
<script src="/static/js/telemetry.js"></script>
<script>
(function () {
  let profile = null;
  try {
    profile = JSON.parse(localStorage.getItem('spectrum_sensory_profile') || 'null');
  } catch (_) {}
  if (!profile) {
    document.getElementById('hub-banner').hidden = false;
  } else {
    const chip = document.getElementById('profile-chip');
    const labels = { seeking: 'Ищет стимуляцию', hyper: 'Чувствителен', hypo: 'Слабая реакция', mixed: 'Смешанный профиль' };
    const icons = { seeking: '🎢', hyper: '🌙', hypo: '🌫️', mixed: '🌗' };
    chip.innerHTML =
      '<span>' + (icons[profile.dominant] || '🌗') + '</span>' +
      '<span>' + (labels[profile.dominant] || 'Профиль') + '</span>' +
      '<a href="/onboarding" class="hub-profile-chip-edit">изменить</a>';
    chip.hidden = false;
  }
  window.SP && window.SP.event && window.SP.event('hub_open', {
    has_profile: !!profile,
    profile: profile ? profile.dominant : null,
  });
})();
</script>
<script src="/static/js/pwa.js" defer></script>
</body>
</html>
