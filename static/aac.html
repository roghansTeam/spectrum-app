<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
<title>Голос — Спектр</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<script>(function(){try{var p=JSON.parse(localStorage.getItem("spectrum_sensory_profile")||"null");if(p&&p.dominant&&["hyper","hypo","seeking","mixed"].indexOf(p.dominant)>=0)document.documentElement.classList.add("sp-profile-"+p.dominant)}catch(e){}})();</script>
<link rel="stylesheet" href="/static/css/tokens.css">
<link rel="manifest" href="/manifest.webmanifest">
<meta name="theme-color" content="#4a90e2">
<meta name="description" content="Спектр — бесплатные инструменты коммуникации для семей с детьми с расстройством аутистического спектра. AAC, расписание, эмоции, истории.">
<meta property="og:title" content="Спектр">
<meta property="og:description" content="Инструменты для общения и поддержки детей с РАС. Открыл ссылку — работает.">
<meta property="og:image" content="https://spectrum-app.fly.dev/static/assets/og-image.png">
<meta property="og:type" content="website">
<meta property="og:url" content="https://spectrum-app.fly.dev/">
<meta property="og:locale" content="ru_RU">
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="Спектр">
<meta name="twitter:description" content="Инструменты для общения и поддержки детей с РАС.">
<meta name="twitter:image" content="https://spectrum-app.fly.dev/static/assets/og-image.png">
<link rel="icon" type="image/png" sizes="192x192" href="/static/assets/icon-192.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Спектр">
<link rel="apple-touch-icon" href="/static/assets/icon-192.png">
<link rel="icon" type="image/svg+xml" href="/static/assets/icon.svg">
<link rel="stylesheet" href="/static/css/aac.css">
</head>
<body>
<main class="aac">
  <header class="aac-top">
    <button class="aac-back" aria-label="Назад" onclick="location.href='/'">←</button>
    <h1 class="aac-title" id="aac-title">Голос</h1>
    <div class="aac-mode-group">
      <button class="aac-mode-btn" id="phase2-toggle" aria-label="Режим жеста (Phase II)" title="Перетаскивать карточки">🖐️</button>
      <button class="aac-mode-btn" id="mode-toggle" aria-label="Режим записи">✏️</button>
    </div>
  </header>

  <div class="aac-mode-banner" id="mode-banner" hidden>
    <span class="aac-mode-banner-text">Режим записи. Нажмите на карточку, чтобы записать свой голос.</span>
    <button class="aac-mode-banner-close" id="mode-banner-close">Закрыть</button>
  </div>

  <div class="aac-mode-banner aac-mode-banner-phase2" id="phase2-banner" hidden>
    <span class="aac-mode-banner-text">Жест: перетащите карточку в большую зону «Хочу сказать…».</span>
    <button class="aac-mode-banner-close" id="phase2-banner-close">Закрыть</button>
  </div>

  <div class="aac-partner-zone" id="partner-zone">Хочу сказать…</div>

  <div class="aac-strip" id="strip">
    <span class="aac-strip-empty">Выбери карточки</span>
  </div>

  <div class="aac-controls">
    <button class="aac-btn aac-btn-clear" id="btn-clear">Очистить</button>
    <button class="aac-btn aac-btn-say" id="btn-say">Сказать</button>
  </div>

  <nav class="aac-tabs" id="tabs"></nav>

  <div class="aac-search-wrap">
    <input type="search" class="aac-search" id="search-input" placeholder="Поиск слова…" inputmode="text" autocomplete="off">
    <button class="aac-search-clear" id="search-clear" hidden aria-label="Очистить">×</button>
  </div>

  <div class="aac-grid" id="grid"></div>

  <!-- Voice recorder modal -->
  <div class="vr-modal" id="vr-modal" hidden>
    <div class="vr-backdrop" id="vr-backdrop"></div>
    <div class="vr-panel">
      <button class="vr-close" id="vr-close" aria-label="Закрыть">×</button>
      <div class="vr-card">
        <div class="vr-card-icon" id="vr-card-icon"></div>
        <div class="vr-card-label" id="vr-card-label"></div>
      </div>
      <div class="vr-status" id="vr-status">Удерживайте кнопку — говорите слово</div>
      <button class="vr-record" id="vr-record">
        <span class="vr-record-dot"></span>
      </button>
      <div class="vr-actions">
        <button class="vr-action vr-action-play" id="vr-play" hidden>▶ Прослушать</button>
        <button class="vr-action vr-action-delete" id="vr-delete" hidden>Удалить</button>
      </div>
    </div>
  </div>
</main>
<script src="/static/js/telegram.js"></script>
<script src="/static/js/tts.js"></script>
<script src="/static/js/voice_storage.js"></script>
<script src="/static/js/voice_recorder.js"></script>
<script src="/static/js/telemetry.js"></script>
<script src="/static/js/aac.js"></script>
<script src="/static/js/sensory.js" defer></script>
<script src="/static/js/bugreport.js" defer></script>
<script src="/static/js/pwa.js" defer></script>
</body>
</html>
