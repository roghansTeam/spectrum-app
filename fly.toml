app = "spectrum-app"
primary_region = "fra"

[build]

[env]
  DATA_PATH = "/data"

[http_service]
  internal_port = 8080
  force_https = true
  # TG bot uses long-polling — machine must stay up 24/7, otherwise
  # bot stops responding to /start until next HTTP wake-up.
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 1

[mounts]
  source = "data"
  destination = "/data"

[[vm]]
  memory = "256mb"
  cpu_kind = "shared"
  cpus = 1
